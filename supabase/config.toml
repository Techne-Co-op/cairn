# Supabase CLI config. Used by the local stack (`supabase start`) and as the
# reference for project settings. The remote project's auth settings are set in
# the dashboard; the line that matters there is "Allow anonymous sign-ins".
project_id = "cairn"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Every visitor becomes a peer without an email. REQUIRED for Cairn.
enable_anonymous_sign_ins = true
enable_signup = true

[auth.email]
enable_signup = false
enable_confirmations = false
